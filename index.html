<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIELD DZ x طموح | الإطلاق المبتكر</title>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;500;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #060b13; 
            --grid-color: rgba(255, 255, 255, 0.03);
            --shield-cyan: #00f0ff;
            --tomouh-gold: #ffc500;
            --text-main: #ffffff;
            --text-muted: #8a9bb2;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Alexandria', sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .tech-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px; z-index: 0; opacity: 0.5;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) scale(3);
            animation: gridMove 20s linear infinite;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 1s cubic-bezier(0.25, 1, 0.5, 1); z-index: 10;
        }
        .screen.active { opacity: 1; pointer-events: auto; }

        .init-btn {
            background: rgba(0, 240, 255, 0.05); border: 1px solid rgba(0, 240, 255, 0.3);
            color: var(--shield-cyan); padding: 20px 60px; font-size: 1.2rem;
            font-family: 'Alexandria', sans-serif; font-weight: 500; letter-spacing: 3px;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.4s ease; position: relative; overflow: hidden;
        }
        .init-btn:hover {
            background: var(--shield-cyan); color: var(--bg-base); box-shadow: 0 0 40px rgba(0, 240, 255, 0.4); transform: scale(1.05);
        }

        .countdown-stage {
            position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
        }

        .shockwave {
            position: absolute; width: 100px; height: 100px; border-radius: 50%;
            border: 2px solid var(--shield-cyan); opacity: 0; transform: scale(0.5); pointer-events: none;
        }
        .shockwave.active { animation: explode 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; }

        .number {
            font-family: 'Space Grotesk', sans-serif; font-size: 40vh; font-weight: 700; position: absolute;
            color: transparent; -webkit-text-stroke: 3px rgba(255, 255, 255, 0.8); opacity: 0; filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.6));
        }
        .number.focus-in { animation: laserFocus 0.9s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        .launch-content { text-align: center; max-width: 1100px; padding: 0 40px; display: flex; flex-direction: column; align-items: center; }
        .logo-box { position: relative; margin-bottom: 40px; }
        .logo-img { max-width: 320px; opacity: 0; transform: scale(0.9) translateY(40px); filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.5)); transition: all 1.8s cubic-bezier(0.2, 1, 0.3, 1) 0.5s; }
        .logo-img.show { opacity: 1; transform: scale(1) translateY(0); }

        .vision-message {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 40px;
            backdrop-filter: blur(10px); opacity: 0; transform: translateY(30px); transition: all 1.5s ease 1s;
        }
        .vision-message.show { opacity: 1; transform: translateY(0); }

        .vision-title { font-size: 2.8rem; font-weight: 900; color: #ffffff; margin: 0 0 20px 0; letter-spacing: 2px; }
        .vision-title span { color: var(--shield-cyan); }
        .vision-text { font-size: 1.3rem; line-height: 1.9; color: var(--text-muted); font-weight: 300; margin: 0; }
        .vision-text strong { color: #ffffff; font-weight: 500; }

        .tamouh-badge { margin-top: 50px; display: flex; flex-direction: column; align-items: center; opacity: 0; transition: all 2s ease 2s; }
        .tamouh-badge.show { opacity: 1; }
        .badge-line { width: 2px; height: 40px; background: linear-gradient(to bottom, transparent, var(--tomouh-gold)); margin-bottom: 15px; }
        .badge-text { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 8px;}
        .badge-name { font-size: 2.2rem; font-weight: 900; color: var(--tomouh-gold); text-shadow: 0 0 20px rgba(255, 197, 0, 0.3); letter-spacing: 2px; }

        @keyframes gridMove { 100% { background-position: 0 50px; } }
        @keyframes laserFocus {
            0% { transform: scale(3); filter: blur(20px); opacity: 0; -webkit-text-stroke: 1px rgba(0, 240, 255, 0.2); }
            40% { opacity: 1; -webkit-text-stroke: 4px rgba(0, 240, 255, 1); }
            100% { transform: scale(1); filter: blur(0); opacity: 0.9; -webkit-text-stroke: 2px rgba(255, 255, 255, 0.8); color: rgba(255,255,255,0.1); }
        }
        @keyframes explode {
            0% { transform: scale(0.5); opacity: 1; border-width: 10px; }
            100% { transform: scale(6); opacity: 0; border-width: 1px; }
        }
    </style>
</head>
<body>

    <div class="tech-grid"></div>

    <div id="intro-screen" class="screen active">
        <button class="init-btn" onclick="igniteLaunchSequence()">بدء بروتوكول الإطلاق</button>
    </div>

    <div id="countdown-screen" class="screen">
        <div class="countdown-stage" id="stage">
            <div id="shockwave" class="shockwave"></div>
        </div>
    </div>

    <div id="final-screen" class="screen">
        <div class="launch-content">
            <div class="logo-box">
                <img src="photo_2026-05-04_14-48-11-removebg-preview.png" alt="SHIELD DZ Logo" id="f-logo" class="logo-img">
            </div>
            
            <div class="vision-message" id="f-vision">
                <h1 class="vision-title">المستقبل يبدأ <span>الآن</span></h1>
                <p class="vision-text">
                    شكراً لكل من شرفنا بحضوره في هذه اللحظة الفاصلة.<br>
                    اليوم، نحن لا نعلن عن مجرد مشروع؛ بل <strong>نُطلق رؤية استراتيجية</strong> تدمج الابتكار التكنولوجي بالرعاية الصحية.<br>
                    رحلتنا انطلقت، وبدعمكم وشراكتكم، نصنع أثراً يمتد لأجيال.
                </p>
            </div>

            <div class="tamouh-badge" id="f-tamouh">
                <div class="badge-line"></div>
                <div class="badge-text">هندسة، إبداع، وقيادة</div>
                <div class="badge-name">تعاونية فريق طموح</div>
            </div>
        </div>
    </div>

    <script>
        let count = 10;
        const stage = document.getElementById('stage');
        const shockwave = document.getElementById('shockwave');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // نظام نطق الصوت الدرامي والسينمائي
        let availableVoices = [];
        window.speechSynthesis.onvoiceschanged = () => { availableVoices = window.speechSynthesis.getVoices(); };

        function getPremiumArabicVoice() {
            if (availableVoices.length === 0) availableVoices = window.speechSynthesis.getVoices();
            const premiumNames = ['Google العربية', 'Microsoft Naayf', 'Microsoft Tarik', 'Maged'];
            for (let name of premiumNames) {
                let voice = availableVoices.find(v => v.name.includes(name));
                if (voice) return voice;
            }
            return availableVoices.find(v => v.lang.includes('ar')) || null;
        }

        function announce(text, rate = 0.85, pitch = 0.6) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            const bestVoice = getPremiumArabicVoice();
            if (bestVoice) utterance.voice = bestVoice;
            else utterance.lang = 'ar-SA';
            utterance.rate = rate; 
            utterance.pitch = pitch; 
            window.speechSynthesis.speak(utterance);
        }

        // ==========================================
        // المحرك الصوتي الجديد: ضربة سينمائية (Cinematic Trailer Hit)
        // ==========================================
        function playCinematicImpact(currentNum) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            // 1. الضربة العميقة (Sub-Bass Boom) تهز المكان
            const subOsc = audioCtx.createOscillator();
            const subGain = audioCtx.createGain();
            subOsc.type = 'sine';
            // تبدأ بتردد 150 وتنخفض بسرعة لـ 20 لتعطي إحساس السقوط الحر
            subOsc.frequency.setValueAtTime(150, now);
            subOsc.frequency.exponentialRampToValueAtTime(20, now + 0.5);
            
            subGain.gain.setValueAtTime(1.5, now); // صوت مرتفع للضربة
            subGain.gain.exponentialRampToValueAtTime(0.001, now + 1.2); 
            
            subOsc.connect(subGain).connect(audioCtx.destination);
            subOsc.start(now);
            subOsc.stop(now + 1.2);

            // 2. مؤثر الهواء أو الاندفاع (Impact Whoosh) للواقعية
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // توليد ضوضاء بيضاء
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            // فلترة الضوضاء لتبدو وكأنها اندفاع هواء ضخم
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.setValueAtTime(1000, now);
            noiseFilter.frequency.exponentialRampToValueAtTime(100, now + 0.5); 
            
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.4, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

            noise.connect(noiseFilter).connect(noiseGain).connect(audioCtx.destination);
            noise.start(now);

            // 3. رنين التوتر (Tension Ping) - يظهر فقط في آخر 5 ثواني
            if (currentNum <= 5) {
                const pingOsc = audioCtx.createOscillator();
                const pingGain = audioCtx.createGain();
                pingOsc.type = 'sine';
                
                // التردد يرتفع كلما اقتربنا من الصفر
                const freq = 600 + ((5 - currentNum) * 150); 
                pingOsc.frequency.setValueAtTime(freq, now);
                
                pingGain.gain.setValueAtTime(0, now);
                pingGain.gain.linearRampToValueAtTime(0.2, now + 0.05); // يضرب بسرعة
                pingGain.gain.exponentialRampToValueAtTime(0.001, now + 0.8); // يتلاشى
                
                pingOsc.connect(pingGain).connect(audioCtx.destination);
                pingOsc.start(now);
                pingOsc.stop(now + 0.8);
            }
        }

        // ==========================================

        function playCinematicDrone() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(130.81, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 2); 
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 12); 
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 12);
        }

        function playPremiumTechLaunch() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;

            const chord = [261.63, 329.63, 392.00, 493.88]; 
            chord.forEach(freq => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.5); 
                gain.gain.exponentialRampToValueAtTime(0.001, now + 6); 
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 6);
            });

            const sub = audioCtx.createOscillator();
            const subGain = audioCtx.createGain();
            sub.type = 'triangle';
            sub.frequency.setValueAtTime(65.41, now);
            subGain.gain.setValueAtTime(0.6, now);
            subGain.gain.exponentialRampToValueAtTime(0.001, now + 5);
            sub.connect(subGain).connect(audioCtx.destination);
            sub.start(now); sub.stop(now + 5);
        }

        function triggerNumberDisplay(num) {
            const oldNum = document.querySelector('.number');
            if (oldNum) oldNum.remove();

            const numEl = document.createElement('div');
            numEl.className = 'number focus-in';
            numEl.innerText = num;
            stage.appendChild(numEl);

            shockwave.classList.remove('active');
            void shockwave.offsetWidth;
            shockwave.classList.add('active');

            // تشغيل الضربة السينمائية القوية بدلاً من الصوت العادي
            playCinematicImpact(num); 
        }

        function igniteLaunchSequence() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            availableVoices = window.speechSynthesis.getVoices();
            
            document.getElementById('intro-screen').classList.remove('active');
            document.getElementById('countdown-screen').classList.add('active');

            triggerNumberDisplay(count);

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    triggerNumberDisplay(count);
                } else {
                    clearInterval(interval);
                    executeFinalVision();
                }
            }, 1000);
        }

        function executeFinalVision() {
            document.getElementById('countdown-screen').classList.remove('active');
            window.speechSynthesis.cancel();
            
            setTimeout(() => {
                document.getElementById('final-screen').classList.add('active');
                
                playPremiumTechLaunch();
                playCinematicDrone();

                setTimeout(() => {
                    const epicText = "تم الإطلاق الرسمي، لمشروع شيلد دي زاد. ... المستقبل، يبدأ الآن. ... برعاية، وإبداع، ... تعاونية فريق طموح.";
                    announce(epicText, 0.8, 0.6);
                }, 800);

                document.getElementById('f-logo').classList.add('show');
                document.getElementById('f-vision').classList.add('show');
                document.getElementById('f-tamouh').classList.add('show');

            }, 1000);
        }
    </script>
</body>
</html>
